<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNC TV Player</title>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial;
    text-align: center;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    margin-top: 50px;
}

video {
    width: 100%;
    height: auto;
}
</style>
</head>

<body>

<h2>TNC TV</h2>

<button onclick="playChannel()">▶ Play Channel</button>

<video id="video" controls></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
function playChannel() {
    const video = document.getElementById('video');
    const url = "https://a2.kora-plus.dad/watch/bundes2.m3u8";

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play();
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
    }

    // FULLSCREEN
    if (video.requestFullscreen) {
        video.requestFullscreen();
    } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
    }

    // ROTATE SCREEN (works only some devices)
    if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock("landscape").catch(function(error) {
            console.log("Rotation not allowed");
        });
    }
}
</script>

</body>
</html>
